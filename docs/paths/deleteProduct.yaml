delete:
  tags:
    - Products
  summary: Eliminar un producto
  description: Este endpoint permite eliminar un producto del sistema por medio de su id.
  parameters:
    - in: path
      name: productID
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Producto eliminado exitosamente
    '404':
      description: Producto no encontrado
    '500':
      description: Error interno del servidor