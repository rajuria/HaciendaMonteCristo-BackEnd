get:
  tags:
    - Products
  summary: Obtener un producto por ID
  description: Este endpoint sirve para buscar un producto específico por medio de su id.
  parameters:
    - in: path
      name: productID
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Producto encontrado exitosamente
    '404':
      description: Producto no encontrado
    '500':
      description: Error interno del servidor