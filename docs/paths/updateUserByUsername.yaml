put:
  summary: Actualizar datos de un usuario
  description: Modifica la información de un usuario existente. No permite cambiar el username.
  tags: [ Users ]
  parameters:
    - in: path
      name: username
      required: true
      schema:
        type: string
      example: "rajuria"
  requestBody:
    required: true
    content:
      application/json:
        example:
          name: "Rafael G. Ajuria"
          status: "inactivo"
          roleID: "3"
  responses:
    '200':
      description: Usuario actualizado exitosamente
      content:
        application/json:
          example:
            message: "Usuario actualizado exitosamente"
            data:
              username: "rajuria"
              name: "Rafael G. Ajuria"
              roleID: "3"
              status: "inactivo"
    '400':
      description: Error de validación de negocio
      content:
        application/json:
          example:
            error: "El nombre de usuario no puede cambiarse"
    '404':
      description: Usuario no encontrado
      content:
        application/json:
          example:
            error: "Usuario no encontrado"
    '500':
      description: Error en la Base de Datos