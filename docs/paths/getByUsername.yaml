get:
  summary: Obtener usuario por username
  description: Devuelve los detalles de un usuario específico.
  tags: [ Users ]
  parameters:
    - in: path
      name: username
      required: true
      schema:
        type: string
      description: El nombre de usuario único
      example: "rajuria"
  responses:
    '200':
      description: Usuario leído exitosamente
      content:
        application/json:
          example:
            message: "Usuario leido exitosamente"
            data:
              username: "rajuria"
              name: "Rafael Gustavo Ajuria"
              roleID: "2"
              status: "activo"
              createdAt: "2026-03-02T00:00:00.000Z"
    '404':
      description: Usuario no encontrado
      content:
        application/json:
          example:
            error: "Usuario no encontrado"
    '406':
      description: Faltan parámetros en la ruta
      content:
        application/json:
          example:
            error: "Se requiere el nombre de usuario"
    '500':
      description: Error en la Base de Datos