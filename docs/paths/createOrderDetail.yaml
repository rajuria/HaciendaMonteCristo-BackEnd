post:
  summary: Crear detalle de orden
  description: Crea un nuevo detalle para una orden existente.
  tags: [ Order Details ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            orderDetailID:
              type: integer
            orderID:
              type: integer
            productID:
              type: integer
            quantity:
              type: integer
            price:
              type: number
        example:
          orderDetailID: 1
          orderID: 1045
          productID: 99
          quantity: 2
          price: 15.50
  responses:
    '201':
      description: Detalle de orden creado exitosamente
      content:
        application/json:
          example:
            message: "Detalle de orden creado exitosamente"
            data:
              orderDetailID: 1
              orderID: 1045
              productID: 99
              quantity: 2
              price: 15.50
    '400':
      description: Faltan campos requeridos
      content:
        application/json:
          example:
            error: "todos los campos son requeridos: orderDetailID, orderID, productID, quantity, price"
    '500':
      description: Error en el servidor
      content:
        application/json:
          example:
            error: "Ocurrió un error en el servidor al crear el detalle."