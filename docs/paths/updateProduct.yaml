put:
  tags:
    - Products
  summary: Actualizar un producto
  description: Este endpoint permite actualizar la información de un producto por medio de su id.
  parameters:
    - in: path
      name: productID
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Producto actualizado exitosamente
    '400':
      description: Datos inválidos
    '404':
      description: Producto no encontrado
    '500':
      description: Error interno del servidor