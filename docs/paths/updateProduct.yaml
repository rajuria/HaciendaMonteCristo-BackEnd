post:
  tags:
    - Products
  summary: Crear un nuevo producto
  description: Este endpoint permite registrar un nuevo producto en el sistema.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            productID:
              type: string
              example: "P999"
            name:
              type: string
              example: "Producto prueba"
            currentPrice:
              type: number
              example: 100
            currentStock:
              type: integer
              example: 10
  responses:
    '201':
      description: Producto creado exitosamente
    '400':
      description: Datos inválidos o incompletos
    '500':
      description: Error interno del servidor