post:
  summary: Crear detalle de factura
  description: Agrega un detalle a una factura.
  tags: [ InvoiceDetails ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - invoiceDetailID
            - invoiceID
            - productID
            - quantity
            - pricePerItem
          properties:
            invoiceDetailID:
              type: string
              example: "D0001"
            invoiceID:
              type: string
              example: "F0001"
            productID:
              type: string
              example: "P0005"
            quantity:
              type: integer
              example: 2
            pricePerItem:
              type: number
              format: float
              example: 150.75
  responses:
    '201':
      description: Detalle de factura creado exitosamente
      content:
        application/json:
          example:
            message: "Detalle de factura creado exitosamente"
            data:
              invoiceDetailID: "D0001"
              invoiceID: "F0001"
              productID: "P0005"
              quantity: 2
              pricePerItem: 150.75
    '400':
      description: Faltan campos requeridos
      content:
        application/json:
          example:
            error: "invoiceDetailID, invoiceID, productID, quantity y pricePerItem son campos requeridos"
    '500':
      description: Error en la Base de Datos
      content:
        application/json:
          example:
            error: "Error en la Base de Datos"