post:
  summary: Crear un nuevo usuario
  description: Registra un nuevo usuario en el sistema. El estado se asigna automáticamente como 'activo'.
  tags: [ Users ]
  requestBody:
    required: true
    content:
      application/json:
        example:
          username: "jperez"
          password: "password123"
          name: "Juan Perez"
          roleID: "1"
  responses:
    '201':
      description: Usuario creado exitosamente
      content:
        application/json:
          example:
            message: "Usuario creado exitosamente"
            data:
              username: "jperez"
              password: "password123"
              name: "Juan Perez"
              roleID: "1"
              status: "activo"
    '400':
      description: Faltan campos requeridos
      content:
        application/json:
          example:
            error: "username, password, name y roleID son campos requeridos"
    '500':
      description: Error del servidor
      content:
        application/json:
          example:
            error: "Validation error"