openapi: 3.0.0
info:
  title: Hacienda Montecristo APIs
  description: Documentación de APIs del Back end del proyecto de la Hacienda Montecristo
  version: 1.0.15

servers:
  - url: http://localhost:3000/api/
    description: Local development server

paths:
  /users/get:
    $ref: "./paths/getAllUsers.yaml"
  /users/get/:{username}:
    $ref: "./paths/getByUsername.yaml"
  /users/create:
    $ref: "./paths/createUser.yaml"
  /users/update/:{username}:
    $ref: "./paths/updateUserbyUsername.yaml"
  /invoices/create:
    $ref: "./paths/createInvoice.yaml"
  /invoices/get:
    $ref: "./paths/getAllInvoices.yaml"
  /invoices/get/{invoiceID}:
    $ref: "./paths/getInvoiceByID.yaml"
  /invoice-details/create:
    $ref: "./paths/createInvoiceDetail.yaml"
  /invoice-details/get/{invoiceID}:
    $ref: "./paths/getInvoiceDetailsByInvoiceID.yaml"
  /invoice-details/delete/{invoiceDetailID}:
    $ref: "./paths/deleteInvoiceDetail.yaml"